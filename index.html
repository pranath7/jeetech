  <!-- Suppress Framer Motion benign list keys console warnings and route errors to overlay -->
  <script>
    const originalError = console.error;
    console.error = (...args) => {
      if (args[0] && typeof args[0] === 'string' && (
        args[0].includes('React does not recognize') ||
        args[0].includes('Each child in a list should have a unique') ||
        args[0].includes('framer-motion')
      )) {
        return;
      }
      originalError(...args);

      const consoleEl = document.getElementById('error-console');
      const messageEl = document.getElementById('error-message');
      if (consoleEl && messageEl) {
        consoleEl.style.display = 'block';
        const msg = args.map(arg => {
          if (arg instanceof Error) return arg.stack || arg.message;
          if (typeof arg === 'object') {
            try {
              return JSON.stringify(arg);
            } catch(e) {
              return String(arg);
            }
          }
          return String(arg);
        }).join(' ');
        messageEl.textContent += (messageEl.textContent ? '\n' : '') + msg;
      }
    };
  </script>

<body class="bg-slate-50 text-slate-900 antialiased overflow-x-hidden selection:bg-blue-600 selection:text-white">

    <!-- Logo & Arc Animation Wrapper -->

      <!-- SVG Arc Path -->

        <defs>

          </filter>
          <linearGradient id="arc-gradient" x1="0%" y1="0%" x2="100%" y2="0%">

            <stop offset="30%" stop-color="#60a5fa" stop-opacity="0.75" />

    <!-- Progress loader bar -->

  <!-- Root React Mounting Target -->

  <!-- On-screen error overlay to diagnose loading issues -->
  <div id="error-console" style="display: none; position: fixed; bottom: 20px; left: 20px; right: 20px; background: rgba(220, 38, 38, 0.95); color: white; padding: 20px; border-radius: 12px; font-family: monospace; font-size: 14px; z-index: 99999; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid #ef4444;">
    <h4 style="margin: 0 0 10px 0; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 5px;">⚠️ JavaScript Runtime Error Detected</h4>
    <pre id="error-message" style="margin: 0; white-space: pre-wrap; word-break: break-all;"></pre>
  </div>
  <script>
    window.addEventListener('error', function(event) {
      const consoleEl = document.getElementById('error-console');
      const messageEl = document.getElementById('error-message');
      if (consoleEl && messageEl) {
        consoleEl.style.display = 'block';
        messageEl.textContent += (messageEl.textContent ? '\n' : '') + 
          event.message + ' at ' + event.filename + ':' + event.lineno + ':' + event.colno;
      }
    });
    window.addEventListener('unhandledrejection', function(event) {
      const consoleEl = document.getElementById('error-console');
      const messageEl = document.getElementById('error-message');
      if (consoleEl && messageEl) {
        consoleEl.style.display = 'block';
        messageEl.textContent += (messageEl.textContent ? '\n' : '') + 
          'Unhandled Promise Rejection: ' + event.reason;
      }
    });
  </script>

  <!-- Load Main App & Mount -->
  <script type="text/babel" src="./App.js?v=4.0"></script>
  <script type="text/babel">
    function mount() {
      if (
        window.App && 
        window.Hero && 
        window.About && 
        window.Capabilities && 
        window.RepairsService && 
        window.Product3DViewer && 
        window.DealerTools && 
        window.ModelShowcase && 
        window.ComboSupport && 
        window.QCTest && 
        window.DropSimulator && 
        window.MapLocator && 
        window.Contact && 
        window.Navbar && 
        window.FadingVideo && 
        window.BlurText
      ) {
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(window.App));

        // Fade out preloader smoothly once mounted
        const preloader = document.getElementById('preloader');
        if (preloader) {
          preloader.style.opacity = '0';
          preloader.style.transform = 'scale(1.05)';
          preloader.style.pointerEvents = 'none';
          setTimeout(() => preloader.remove(), 800);
        }
      } else {
        setTimeout(mount, 50);
      }
    }
    mount();
  </script>
